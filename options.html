<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Readmd 设置</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: #fafafa; color: #171717; padding: 40px; max-width: 520px; margin: 0 auto; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 24px; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #444; }
    select, input { width: 100%; padding: 8px 12px; font-size: 14px; border: 1px solid #d0d7de; border-radius: 6px; margin-bottom: 16px; }
    .llm-fields, .volcengine-fields { display: none; }
    .llm-fields.show, .volcengine-fields.show { display: block; }
    button { background: #171717; color: #fff; border: none; padding: 8px 20px; border-radius: 6px; font-size: 14px; cursor: pointer; }
    button:hover { background: #333; }
    .saved { color: #1a7f37; font-size: 13px; margin-left: 8px; display: none; }
    .hint { font-size: 12px; color: #666; margin-top: -12px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <h1>Readmd 设置</h1>
  <label for="provider">翻译方式</label>
  <select id="provider">
    <option value="free">免费翻译（零配置）</option>
    <option value="volcengine">火山翻译（Volcengine）</option>
    <option value="llm">自定义 LLM</option>
  </select>
  <div class="volcengine-fields" id="volcengineFields">
    <label for="volcAccessKeyId">AccessKeyId</label>
    <input type="password" id="volcAccessKeyId">
    <label for="volcSecretKey">SecretKey</label>
    <input type="password" id="volcSecretKey">
    <label for="volcRegion">Region</label>
    <input type="text" id="volcRegion" placeholder="cn-north-1">
    <p class="hint">火山引擎机器翻译，200万字符/月免费</p>
  </div>
  <div class="llm-fields" id="llmFields">
    <label for="apiKey">API Key</label>
    <input type="password" id="apiKey" placeholder="sk-...">
    <label for="baseUrl">Base URL</label>
    <input type="text" id="baseUrl" placeholder="https://open.bigmodel.cn/api/paas/v4/">
    <p class="hint">OpenAI 兼容接口，留空用智谱 GLM</p>
    <label for="model">模型</label>
    <input type="text" id="model" placeholder="glm-4-flash">
  </div>
  <button id="save">保存</button>
  <span class="saved" id="saved">已保存</span>
  <script src="src/options.js"></script>
</body>
</html>
