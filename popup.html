<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; padding: 16px; color: #1f2328; }
    h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    label { display: block; font-size: 12px; font-weight: 500; color: #656d76; margin-bottom: 4px; }
    select, input { width: 100%; padding: 6px 8px; font-size: 13px; border: 1px solid #d0d7de; border-radius: 6px; margin-bottom: 10px; background: #fff; }
    .llm-fields, .volcengine-fields { display: none; }
    .llm-fields.show, .volcengine-fields.show { display: block; }
    button { width: 100%; background: #1f2328; color: #fff; border: none; padding: 7px; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500; }
    button:hover { background: #333; }
    .saved { color: #1a7f37; font-size: 12px; text-align: center; margin-top: 6px; display: none; }
    .hint { font-size: 11px; color: #999; margin: -6px 0 10px; }
  </style>
</head>
<body>
  <h2>Readmd 设置</h2>
  <label>翻译方式</label>
  <select id="provider">
    <option value="free">免费翻译（零配置）</option>
    <option value="volcengine">火山翻译（Volcengine）</option>
    <option value="llm">自定义 LLM</option>
  </select>
  <div class="volcengine-fields" id="volcengineFields">
    <label>AccessKeyId</label>
    <input type="password" id="volcAccessKeyId">
    <label>SecretKey</label>
    <input type="password" id="volcSecretKey">
    <label>Region</label>
    <input type="text" id="volcRegion" placeholder="cn-north-1">
    <p class="hint">火山引擎机器翻译，200万字符/月免费</p>
  </div>
  <div class="llm-fields" id="llmFields">
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="sk-...">
    <label>Base URL</label>
    <input type="text" id="baseUrl" placeholder="https://open.bigmodel.cn/api/paas/v4/">
    <p class="hint">OpenAI 兼容接口，留空用智谱 GLM</p>
    <label>模型</label>
    <input type="text" id="model" placeholder="glm-4-flash">
  </div>
  <button id="save">保存</button>
  <div class="saved" id="saved">已保存</div>
  <script src="src/options.js"></script>
</body>
</html>
